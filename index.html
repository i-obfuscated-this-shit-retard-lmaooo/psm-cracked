<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Administrator: Command Prompt</title>
<style>
  @font-face {
    font-family: 'Cascadia Mono';
    src: local('Cascadia Mono'), local('Cascadia Code'), local('Consolas');
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    display: flex;
    flex-direction: column;
  }

  #termwindow {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #0C0C0C;
  }

  #tabbar {
    height: 32px;
    min-height: 32px;
    background: #2E2E2E;
    display: flex;
    align-items: stretch;
    -webkit-user-select: none;
    user-select: none;
  }

  #tabbar .shield {
    width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: none;
  }
  #tabbar .shield svg { width: 15px; height: 15px; }

  #tabbar .tabs {
    display: flex;
    align-items: flex-end;
    flex: none;
  }

  .tab {
    background: #0C0C0C;
    border-radius: 6px 6px 0 0;
    display: flex;
    align-items: center;
    height: 32px;
    padding: 0 8px 0 10px;
    min-width: 180px;
    max-width: 220px;
    gap: 7px;
    margin-top: 0;
  }

  .tab .taicon {
    width: 16px; height: 16px; flex: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tab .taicon img {
    width: 100%; height: 100%; object-fit: contain;
  }

  .tab .tatitle {
    font-size: 12px;
    font-weight: 500;
    color: #E4E4E4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tab .taclose {
    width: 18px; height: 18px; flex: none;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    color: #C6C6C6;
    cursor: pointer;
  }
  .tab .taclose:hover { background: #3d3d3d; }
  .tab .taclose svg { width: 8px; height: 8px; }

  #tabbar .newtab, #tabbar .chevron {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: none;
    color: #D6D6D6;
    align-self: center;
    border-radius: 4px;
    cursor: pointer;
  }
  #tabbar .newtab {
    width: 28px;
    height: 26px;
    margin-left: 4px;
  }
  #tabbar .chevron {
    width: 22px;
    height: 26px;
  }
  #tabbar .newtab svg { width: 12px; height: 12px; }
  #tabbar .chevron svg { width: 10px; height: 10px; }
  #tabbar .newtab:hover, #tabbar .chevron:hover {
    background: #3d3d3d;
  }

  #tabbar .drag { flex: 1; }

  #tabbar .wincontrols {
    display: flex;
    height: 100%;
    flex: none;
  }
  #tabbar .wbtn {
    width: 46px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  #tabbar .wbtn:hover { background: #3d3d3d; }
  #tabbar .wbtn.close:hover { background: #c42b1c; }
  #tabbar .wbtn svg { width: 10px; height: 10px; }
  #tabbar .wbtn path, #tabbar .wbtn rect, #tabbar .wbtn line { stroke: #D6D6D6; }

  #terminal-wrap {
    flex: 1;
    background: #0C0C0C;
    padding: 6px 0 4px 10px;
    overflow: hidden;
    position: relative;
    min-height: 0;
  }
  #scrollarea {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 8px;
    padding-bottom: 32px;
    font-family: 'Cascadia Mono', 'Consolas', 'Lucida Console', monospace;
    -webkit-user-select: text;
    user-select: text;
  }
  #scrollarea::-webkit-scrollbar { width: 14px; }
  #scrollarea::-webkit-scrollbar-track { background: #0C0C0C; }
  #scrollarea::-webkit-scrollbar-thumb {
    background: #4d4d4d; border: 4px solid #0C0C0C; background-clip: padding-box;
  }
  #scrollarea::-webkit-scrollbar-thumb:hover { background: #6b6b6b; }

  #output { font-size: 16.4px; line-height: 1.25; color: #CCCCCC; white-space: pre; }
  .line {
    white-space: pre;
    min-height: 20px;
    contain: content;
  }

  #inputline {
    display: none;
  }
  #prompt-prefix { color: #CCCCCC; }
  #typed { color: #CCCCCC; white-space: pre-wrap; word-break: break-all; }
  #cursor {
    display: inline-block; width: 1px; height: 1.25em; background: #CCCCCC;
    animation: blink 1s steps(1) infinite; vertical-align: top;
  }
  @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }

  #hiddeninput { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }

  *::selection { background: #FFFFFF; color: #0C0C0C; }
  *::-moz-selection { background: #FFFFFF; color: #0C0C0C; }
  #output ::selection, #inputline ::selection, .line::selection, #typed::selection, #prompt-prefix::selection {
    background: #FFFFFF; color: #0C0C0C;
  }
</style>
