<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

<head>
	<style type="text/css">
		html,
		body {
			background-color: #222222;
			width: 100%;
			height: 100%;
			margin: 0;
			padding: 0;
			overflow: hidden;
			font-family: Consolas, 'Courier New', monospace;
			color: white;
		}

		#container {
			background-size: cover;
			background-repeat: no-repeat;
			background-position: center;
		}

		body.editor-has-image .monaco-editor,
		body.editor-has-image .monaco-editor .margin,
		body.editor-has-image .monaco-editor-background,
		body.editor-has-image .overflow-guard,
		body.editor-has-image .monaco-scrollable-element,
		body.editor-has-image .lines-content,
		body.editor-has-image .view-lines,
		body.editor-has-image .view-line,
		body.editor-has-image .glyph-margin,
		body.editor-has-image .line-numbers,

		body.editor-has-image .current-line-margin,

			background: transparent !important;

		}
	</style>
	<meta charset="utf-8" />
	<title></title>
</head>

<body>
	<div id="container" style="width:100%;height:100%;"></div>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.js"></script>
	<script type="text/javascript">
		require.config({
			paths: {
				'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs'
			}
		});
		var GetText;
		var SetText;
		var SetTheme;
		var SetScroll;
		var ShowErr;
		var Refresh;
		var SwitchMinimap;
		var SwitchReadonly;
		var SwitchRenderWhitespace;
		var SwitchLinks;
		var SwitchLineHeight;
		var SwitchFontSize;
		var SwitchFolding;
		var SwitchAutoIndent;
		var SwitchFontFamily;
		var SwitchFontLigatures;
		var AddIntellisense;
		var editor;
		var Proposals = [];

		require(['vs/editor/editor.main'], function () {
			function getDependencyProposals() {
				let newProposals = [];
				for (let index = 0; index < Proposals.length; index++) {
					const element = Proposals[index];
					let newElement = {}
					for (const key in element) {
						if (key == "__children__") {
							continue;
						};
						newElement[key] = element[key];
					}
					newProposals.push(newElement)
				}
				return newProposals;
			}

			monaco.editor.defineTheme('net-theme-light', {
				base: 'vs',
				inherit: true,
				rules: [
					{ token: 'global', foreground: '000000' },
					{ token: 'keyword', foreground: 'ff6a00' },
					{ token: 'comment', foreground: '666666' },
					{ token: 'number', foreground: 'ffc600' },
					{ token: 'string', foreground: 'ff8c3a' },
				]
			});

			monaco.editor.defineTheme('net-theme-dark', {
				base: 'vs-dark',
				inherit: true,
				rules: [
					{ token: 'global', foreground: 'FFFFFF', fontStyle: "bold" },
					{ token: 'keyword', foreground: 'ff6a00', fontStyle: "bold" },
					{ token: 'comment', foreground: '666666' },
					{ token: 'number', foreground: 'ffc600' },
					{ token: 'string', foreground: 'ff8c3a' },
				]
			});

			monaco.editor.defineTheme('PDark', {
				base: 'vs-dark',
				inherit: true,
				rules: [
					{ token: '', foreground: '#C3CCDB' },
					{ token: 'variable.language.self', foreground: '#F7768E' },
					{ token: 'variable.parameter.variadic', foreground: '#F7768E' },
					{ token: 'variable.parameter.function', foreground: '#E0AF68' },
					{ token: 'variable.other.constant', foreground: '#FF9E64' },
					{ token: 'variable.property', foreground: '#7DCFFF' },
					{ token: 'variable.object.property', foreground: '#73DACA' },

					{ token: 'keyword', foreground: '#BB9AF7' },
					{ token: 'keyword.local', foreground: '#997BD6', fontStyle: 'italic' },
					{ token: 'keyword.operator', foreground: '#89DDFF' },
					{ token: 'keyword.operator.type.annotation', foreground: '#9ABDF5' },
					{ token: 'keyword.operator.typedef.annotation', foreground: '#89DDFF' },
					{ token: 'keyword.control.export', foreground: '#997BD6', fontStyle: 'italic' },

					{ token: 'operator', foreground: '#89DDFF' },
					{ token: 'operator.type', foreground: '#BB9AF7' },
					{ token: 'operator.special', foreground: '#BB9AF7' },

					{ token: 'entity.name.type.alias', foreground: '#5ab6d6' },
					{ token: 'entity.name.function', foreground: '#7AA2F7' },

					{ token: 'global', foreground: '#7AA2F7' },

					{ token: 'storage.type', foreground: '#BB9AF7' },

					{ token: 'comment', foreground: '#666666', fontStyle: 'italic' },
					{ token: 'comment.highlight.title', foreground: '#89DDFF', fontStyle: 'italic' },
					{ token: 'comment.highlight.name', foreground: '#89DDFF', fontStyle: 'italic' },
					{ token: 'comment.delimiter.modifier', foreground: '#9ABDF5', fontStyle: 'italic' },
					{ token: 'comment.highlight.modifier', foreground: '#7DCFFF', fontStyle: 'italic' },
					{ token: 'comment.highlight.descriptor', foreground: '#F7768E', fontStyle: 'italic' },

					{ token: 'delimiter.longstring', foreground: '#89DDFF' },
					{ token: 'delimiter.bracket', foreground: '#a6afbd' },
					{ token: 'delimiter.array', foreground: '#a6afbd' },
					{ token: 'delimiter.parenthesis', foreground: '#a6afbd' },
					{ token: 'delimiter', foreground: '#a6afbd' },

					{ token: 'string', foreground: '#9ECE6A' },
					{ token: 'longstring', foreground: '#9ECE6A' },
					{ token: 'string.delimeter', foreground: '#89DDFF' },
					{ token: 'string.escape', foreground: '#89DDFF' },

					{ token: 'punctuation.separator.arguments', foreground: '#9ABDF5' },
					{ token: 'punctuation.separator.parameter', foreground: '#89DDFF' },
					{ token: 'punctuation.separator.table', foreground: '#89DDFF' },
					{ token: 'punctuation.definition.block', foreground: '#9ABDF5' },
					{ token: 'punctuation.definition.parameters', foreground: '#9ABDF5' },
					{ token: 'punctuation.definition.typeparameters', foreground: '#89DDFF' },

					{ token: 'constant.language', foreground: '#FF9E64' },
					{ token: 'number', foreground: '#FF9E64' },
					{ token: 'constants', foreground: '#FF9E64' },

					{ token: 'support.function', foreground: '#0DB9D7' },
					{ token: 'support.function.library', foreground: '#0DB9D7' },
					{ token: 'support.type', foreground: '#5ab6d6' },
				],
				colors: {
					'editor.background': '#171717',
					'editor.minimap.shadow': '#000000',

					'editorLineNumber.foreground': '#7A7A7A',
					'editorLineNumber.activeForeground': '#BBBBBB',

					'editorIndentGuide.background': '#1a1a1a',

					'editorSuggestWidget.background': "#181818",
					'editorSuggestWidget.border': "#1a1a1a",
					'editorSuggestWidget.foreground': "#D5D5D5",
					'editorSuggestWidget.selectedBackground': "#404040",
					'editorSuggestWidget.highlightForeground': "#18A0FB",

					'textCodeBlock.background': '#1B1B1B',
				}
			});

			require(['vs/basic-languages/monaco.contribution'], function () {
				monaco.languages.registerCompletionItemProvider('lua', {
					provideCompletionItems: function (model, position) {
						return {
							suggestions: getDependencyProposals(),
						};
					},
					triggerCharacters: ['.', ':', '"'],
				});

				editor = monaco.editor.create(document.getElementById('container'), {
					value: 'print("Hello, world!");',
					language: 'lua',
					theme: "PDark",
					fontSize: "16px",
					fontFamily: "'JetBrains Mono', Consolas, 'Courier New', monospace",
					folding: true,
					dragAndDrop: true,
					links: true,
					smoothScrolling: true,
					stopRenderingLineAfter: 6500,
					cursorBlinking: "smooth",
					cursorSmoothCaretAnimation: true,
					foldingHighlight: false,
					fontLigatures: true,
					formatOnPaste: true,
					showDeprecated: true,
					scrollBeyondLastLine: false,
					suggest: {
						snippetsPreventQuickSuggestions: false,
					},
					padding: {
						top: 6,
					},
					// ========== ALWAYS-VISIBLE SCROLLBARS ==========
					scrollbar: {
						vertical: 'visible',
						horizontal: 'visible',
						useShadows: false,
						verticalScrollbarSize: 14,
						horizontalScrollbarSize: 14,
						alwaysConsumeMouseWheel: false,
					},
					minimap: {
						enabled: false,
					},
					showFoldingControls: "always",
				});
				
				try {
				if (CefSharp) {
					editor.onKeyDown(function(e) {
						if (!(e.altKey || e.ctrlKey || e.shiftKey || e.metaKey)) {
							if (e.key !== 'Backspace' || editor.getValue() !== '')
							CefSharp.PostMessage('keydown')
						}
					})
				} } catch { }

				editor.getModel().updateOptions({ insertSpaces: false })

				// ================== FUNCTION SUGGESTIONS ==================
				(function() {
					// ----- 1. Define standard Lua functions with signatures -----
					var luaFunctions = {
						// General
						'print': {
							params: [{ name: '...', doc: 'values to print' }],
							doc: 'Prints one or more values to the standard output.'
						},
						'type': {
							params: [{ name: 'v', doc: 'any value' }],
							doc: 'Returns the type of its argument as a string.'
						},
						'tostring': {
							params: [{ name: 'v', doc: 'any value' }],
							doc: 'Converts the given value to a string.'
						},
						'tonumber': {
							params: [
								{ name: 'e', doc: 'string or number' },
								{ name: 'base', doc: 'optional base (2–36)' }
							],
							doc: 'Converts its argument to a number.'
						},
						'next': {
							params: [
								{ name: 'table', doc: 'the table' },
								{ name: 'index', doc: 'previous key' }
							],
							doc: 'Returns the next key–value pair from the table.'
						},
						'ipairs': {
							params: [{ name: 't', doc: 'table' }],
							doc: 'Returns an iterator for sequential integer keys.'
						},
						'pairs': {
							params: [{ name: 't', doc: 'table' }],
							doc: 'Returns an iterator for all key–value pairs in a table.'
						},
						'require': {
							params: [{ name: 'modname', doc: 'module name' }],
							doc: 'Loads the specified module.'
						},
						'error': {
							params: [
								{ name: 'message', doc: 'error message' },
								{ name: 'level', doc: 'stack level' }
							],
							doc: 'Raises an error.'
						},
						'assert': {
							params: [
								{ name: 'v', doc: 'condition' },
								{ name: 'message', doc: 'optional error message' }
							],
							doc: 'Raises an error if its argument is false or nil.'
						},
						'select': {
							params: [
								{ name: 'index', doc: 'number or "#"' },
								{ name: '...', doc: 'arguments' }
							],
							doc: 'Returns the arguments after the given index, or the total count if index is "#".'
						},
						'pcall': {
							params: [
								{ name: 'f', doc: 'function' },
								{ name: '...', doc: 'arguments to pass' }
							],
							doc: 'Calls a function in protected mode (returns status and results).'
						},
						'xpcall': {
							params: [
								{ name: 'f', doc: 'function' },
								{ name: 'err', doc: 'error handler' },
								{ name: '...', doc: 'arguments' }
							],
							doc: 'Calls a function in protected mode with a separate error handler.'
						},
						'collectgarbage': {
							params: [
								{ name: 'opt', doc: '"collect", "stop", "restart", "count", "step", "setpause", "setstepmul"' },
								{ name: 'arg', doc: 'optional argument' }
							],
							doc: 'Controls the garbage collector.'
						},
						'_G': {
							params: [],
							doc: 'The global environment table.'
						},
						'_VERSION': {
							params: [],
							doc: 'The current Lua version string.'
						},

						// Math
						'math.abs': {
							params: [{ name: 'x', doc: 'number' }],
							doc: 'Absolute value of x.'
						},
						'math.ceil': {
							params: [{ name: 'x', doc: 'number' }],
							doc: 'Ceiling (smallest integer >= x).'
						},
						'math.floor': {
							params: [{ name: 'x', doc: 'number' }],
							doc: 'Floor (largest integer <= x).'
						},
						'math.max': {
							params: [{ name: 'x', doc: 'first number' }, { name: '...', doc: 'more numbers' }],
							doc: 'Maximum of its arguments.'
						},
						'math.min': {
							params: [{ name: 'x', doc: 'first number' }, { name: '...', doc: 'more numbers' }],
							doc: 'Minimum of its arguments.'
						},
						'math.random': {
							params: [
								{ name: 'm', doc: 'optional lower bound' },
								{ name: 'n', doc: 'optional upper bound' }
							],
							doc: 'Generates a pseudo‑random number.'
						},
						'math.randomseed': {
							params: [{ name: 'x', doc: 'seed number' }],
							doc: 'Sets the seed for the random generator.'
						},
						'math.sqrt': {
							params: [{ name: 'x', doc: 'number' }],
							doc: 'Square root of x.'
						},
						'math.pow': {
							params: [{ name: 'x', doc: 'base' }, { name: 'y', doc: 'exponent' }],
							doc: 'x raised to the power y.'
						},
						'math.log': {
							params: [
								{ name: 'x', doc: 'number' },
								{ name: 'base', doc: 'optional base (default e)' }
							],
							doc: 'Logarithm of x in the given base.'
						},
						'math.exp': {
							params: [{ name: 'x', doc: 'number' }],
							doc: 'e raised to the power x.'
						},
						'math.sin': {
							params: [{ name: 'x', doc: 'angle in radians' }],
							doc: 'Sine of x.'
						},
						'math.cos': {
							params: [{ name: 'x', doc: 'angle in radians' }],
							doc: 'Cosine of x.'
						},
						'math.tan': {
							params: [{ name: 'x', doc: 'angle in radians' }],
							doc: 'Tangent of x.'
						},
						'math.asin': {
							params: [{ name: 'x', doc: 'number' }],
							doc: 'Arc sine of x (in radians).'
						},
						'math.acos': {
							params: [{ name: 'x', doc: 'number' }],
							doc: 'Arc cosine of x (in radians).'
						},
						'math.atan': {
							params: [{ name: 'x', doc: 'number' }],
							doc: 'Arc tangent of x (in radians).'
						},
						'math.atan2': {
							params: [{ name: 'y', doc: 'y coordinate' }, { name: 'x', doc: 'x coordinate' }],
							doc: 'Arc tangent of y/x (in radians).'
						},
						'math.deg': {
							params: [{ name: 'x', doc: 'angle in radians' }],
							doc: 'Converts radians to degrees.'
						},
						'math.rad': {
							params: [{ name: 'x', doc: 'angle in degrees' }],
							doc: 'Converts degrees to radians.'
						},
						'math.pi': {
							params: [],
							doc: 'The value of π.'
						},
						'math.huge': {
							params: [],
							doc: 'The largest representable number.'
						},

						// String
						'string.len': {
							params: [{ name: 's', doc: 'string' }],
							doc: 'Returns the length of the string.'
						},
						'string.sub': {
							params: [
								{ name: 's', doc: 'string' },
								{ name: 'i', doc: 'start index' },
								{ name: 'j', doc: 'end index (optional)' }
							],
							doc: 'Returns a substring of s from i to j.'
						},
						'string.gsub': {
							params: [
								{ name: 's', doc: 'string' },
								{ name: 'pattern', doc: 'search pattern' },
								{ name: 'repl', doc: 'replacement (string or function)' },
								{ name: 'n', doc: 'max replacements (optional)' }
							],
							doc: 'Replaces all occurrences of pattern in s with repl.'
						},
						'string.find': {
							params: [
								{ name: 's', doc: 'string' },
								{ name: 'pattern', doc: 'search pattern' },
								{ name: 'init', doc: 'start position (optional)' },
								{ name: 'plain', doc: 'plain text (optional)' }
							],
							doc: 'Finds the first occurrence of pattern in s.'
						},
						'string.match': {
							params: [
								{ name: 's', doc: 'string' },
								{ name: 'pattern', doc: 'search pattern' },
								{ name: 'init', doc: 'start position (optional)' }
							],
							doc: 'Returns the first captured substring matching pattern.'
						},
						'string.gmatch': {
							params: [
								{ name: 's', doc: 'string' },
								{ name: 'pattern', doc: 'search pattern' }
							],
							doc: 'Returns an iterator that yields all captured substrings.'
						},
						'string.upper': {
							params: [{ name: 's', doc: 'string' }],
							doc: 'Converts the string to uppercase.'
						},
						'string.lower': {
							params: [{ name: 's', doc: 'string' }],
							doc: 'Converts the string to lowercase.'
						},
						'string.reverse': {
							params: [{ name: 's', doc: 'string' }],
							doc: 'Reverses the string.'
						},
						'string.char': {
							params: [{ name: '...', doc: 'integer codes' }],
							doc: 'Returns a string from the given integer codes.'
						},
						'string.byte': {
							params: [
								{ name: 's', doc: 'string' },
								{ name: 'i', doc: 'start index (optional)' },
								{ name: 'j', doc: 'end index (optional)' }
							],
							doc: 'Returns the integer codes of the characters in s.'
						},
						'string.format': {
							params: [
								{ name: 'formatstring', doc: 'format string' },
								{ name: '...', doc: 'values to format' }
							],
							doc: 'Formats a string using printf‑style specifiers.'
						},
						'string.rep': {
							params: [
								{ name: 's', doc: 'string' },
								{ name: 'n', doc: 'number of repetitions' }
							],
							doc: 'Repeats the string n times.'
						},

						// Table
						'table.insert': {
							params: [
								{ name: 't', doc: 'table' },
								{ name: 'pos', doc: 'position (optional)' },
								{ name: 'value', doc: 'value to insert' }
							],
							doc: 'Inserts a value into a table at the given position.'
						},
						'table.remove': {
							params: [
								{ name: 't', doc: 'table' },
								{ name: 'pos', doc: 'position (optional)' }
							],
							doc: 'Removes and returns the element at the given position.'
						},
						'table.sort': {
							params: [
								{ name: 't', doc: 'table' },
								{ name: 'comp', doc: 'comparison function (optional)' }
							],
							doc: 'Sorts a table in place.'
						},
						'table.concat': {
							params: [
								{ name: 't', doc: 'table' },
								{ name: 'sep', doc: 'separator (optional)' },
								{ name: 'i', doc: 'start index (optional)' },
								{ name: 'j', doc: 'end index (optional)' }
							],
							doc: 'Concatenates table elements into a string.'
						},
						'table.pack': {
							params: [{ name: '...', doc: 'values' }],
							doc: 'Returns a table with the given values and a "n" field.'
						},
						'table.unpack': {
							params: [
								{ name: 't', doc: 'table' },
								{ name: 'i', doc: 'start index (optional)' },
								{ name: 'j', doc: 'end index (optional)' }
							],
							doc: 'Returns the elements of the table as separate values.'
						},

						// Coroutine
						'coroutine.create': {
							params: [{ name: 'f', doc: 'function' }],
							doc: 'Creates a new coroutine.'
						},
						'coroutine.resume': {
							params: [
								{ name: 'co', doc: 'coroutine' },
								{ name: '...', doc: 'arguments' }
							],
							doc: 'Resumes a coroutine.'
						},
						'coroutine.yield': {
							params: [{ name: '...', doc: 'values' }],
							doc: 'Yields the current coroutine.'
						},
						'coroutine.status': {
							params: [{ name: 'co', doc: 'coroutine' }],
							doc: 'Returns the status of the coroutine.'
						},
						'coroutine.wrap': {
							params: [{ name: 'f', doc: 'function' }],
							doc: 'Creates a coroutine and returns a function that resumes it.'
						},
						'coroutine.running': {
							params: [],
							doc: 'Returns the running coroutine.'
						},

						// I/O
						'io.open': {
							params: [
								{ name: 'filename', doc: 'file name' },
								{ name: 'mode', doc: 'mode ("r", "w", "a", etc.)' }
							],
							doc: 'Opens a file.'
						},
						'io.close': {
							params: [{ name: 'file', doc: 'file handle (optional)' }],
							doc: 'Closes a file.'
						},
						'io.read': {
							params: [{ name: '...', doc: 'format specifiers' }],
							doc: 'Reads from the standard input.'
						},
						'io.write': {
							params: [{ name: '...', doc: 'values to write' }],
							doc: 'Writes to the standard output.'
						},
						'io.lines': {
							params: [
								{ name: 'filename', doc: 'file name' },
								{ name: '...', doc: 'additional arguments' }
							],
							doc: 'Returns an iterator over the lines of a file.'
						},
						'io.input': {
							params: [{ name: 'file', doc: 'file handle or name' }],
							doc: 'Sets the default input file.'
						},
						'io.output': {
							params: [{ name: 'file', doc: 'file handle or name' }],
							doc: 'Sets the default output file.'
						},
						'io.tmpfile': {
							params: [],
							doc: 'Returns a temporary file handle.'
						},
						'io.type': {
							params: [{ name: 'obj', doc: 'object' }],
							doc: 'Returns the type of an object (file, closed file, or nil).'
						},
						'io.popen': {
							params: [
								{ name: 'prog', doc: 'program command' },
								{ name: 'mode', doc: 'mode ("r" or "w")' }
							],
							doc: 'Opens a process for reading or writing.'
						},
					};

					// ----- 2. Add completions (using your existing AddSnippet) -----
					for (var name in luaFunctions) {
						var info = luaFunctions[name];
						var sig = name + '(' + info.params.map(function(p) { return p.name; }).join(', ') + ')';
						var detail = info.doc;
						AddSnippet('Function', name, {
							label: name,
							insertText: name,
							detail: sig,
							documentation: detail,
							sortText: name

					}

					// ----- 3. Register signature help provider -----
					monaco.languages.registerSignatureHelpProvider('lua', {
						signatureHelpTriggerCharacters: ['(', ','],
						signatureHelpRetriggerCharacters: [','],
						provideSignatureHelp: function(model, position, token) {
							// Find the function name before the '('
							var lineNumber = position.lineNumber;
							var column = position.column;
							var lineText = model.getLineContent(lineNumber);

							var openParenIndex = lineText.lastIndexOf('(', column - 1);
							if (openParenIndex === -1) return null;

							var beforeParen = lineText.substring(0, openParenIndex).trim();
							var match = beforeParen.match(/([a-zA-Z_][a-zA-Z0-9_.]*)$/);
							if (!match) return null;
							var functionName = match[1];

							var info = luaFunctions[functionName];
							if (!info) return null;

							var signatures = [{
								label: functionName + '(' + info.params.map(function(p) { return p.name; }).join(', ') + ')',
								documentation: info.doc,
								parameters: info.params.map(function(p) {
									return {
										label: p.name,
										documentation: p.doc
									};
								})
							}];

							var textBeforeCursor = lineText.substring(openParenIndex + 1, column - 1);
							var commaCount = (textBeforeCursor.match(/,/g) || []).length;
							var activeParam = Math.min(commaCount, info.params.length - 1);

							return {
								value: {
									signatures: signatures,
									activeSignature: 0,
									activeParameter: activeParam,
								},
								dispose: function() {}
							};
						}
					});

					console.log('[Function Suggestions] Loaded ' + Object.keys(luaFunctions).length + ' functions with signature help.');
				})();

				// Kick off the self-typing intro effect now
				_startSelfTypingReplace(editor);
			});

	<!-- Self-typing text replace: called directly at the moment the
	     editor is created (see _startSelfTypingReplace(editor) above),
	     so there's no need to poll/guess when it's "ready". Auto-
	     backspaces the starting text down to a shared prefix, then
	     types a new ending. No colors, no decorations, no CSS. -->
	<script type="text/javascript">
		function _startSelfTypingReplace(ed) {
			if (window.__selfTypingReplaceStarted) return;
			window.__selfTypingReplaceStarted = true;

			// ---- CONFIG: edit these, or override via window.SelfTypingReplaceConfig ----
			var userCfg = window.SelfTypingReplaceConfig || {};
			var ORIGINAL_TEXT = userCfg.originalText || 'print("Hello, world!");'; // exact starting text to wait for
			var KEEP_PREFIX    = userCfg.keepPrefix  || 'print(';                  // the part that stays
			var NEW_SUFFIX     = userCfg.newSuffix   || '"Cracked by homicidal!");';  // what gets typed after the prefix
			// ------------------------------------------------------------------------

			if (ORIGINAL_TEXT.indexOf(KEEP_PREFIX) !== 0) {
				console.warn('[self-typing-replace] keepPrefix is not a prefix of originalText — skipping.');
				return;
			}

			var _live = true;
			var _selfEdit = false;
			var _disposables = [];

			function _track(disposable) {
				if (disposable && typeof disposable.dispose === 'function') {
					_disposables.push(disposable);
				}
			}

			function _cleanupListeners() {
				while (_disposables.length) {
					var d = _disposables.pop();
					try { d.dispose(); } catch (e) {}
				}
			}

			function _kill() {
				_live = false;
				_cleanupListeners();
			}

			function _wait(ms, cb) {
				setTimeout(function () { if (_live) cb(); }, ms + Math.random() * 15);
			}

			function _backspace() {
				_selfEdit = true;
				try { ed.trigger('sig', 'deleteLeft', {}); } catch (e) {}
				setTimeout(function () { _selfEdit = false; }, 0);
			}

			function _eraseTo(fullStr, targetStr, cb) {
				var i = fullStr.length;
				var stopAt = targetStr.length;
				(function step() {
					if (!_live) return;
					if (i <= stopAt) { cb(); return; }
					_backspace();
					i--;
					var stepsIn = fullStr.length - i;
					var delay = stepsIn <= 2 ? 45 : (stepsIn >= fullStr.length - stopAt - 2 ? 26 : 16);
					_wait(delay, step);
				})();
			}

			function _typeChar(ch, cb) {
				if (!_live) return cb();
				try {
					var model = ed.getModel();
					var lineCount = model.getLineCount();
					var lastLineLength = model.getLineLength(lineCount);
					var range = new monaco.Range(lineCount, lastLineLength + 1, lineCount, lastLineLength + 1);
					ed.setSelection(range);
					ed.focus();
					_selfEdit = true;
					ed.trigger('keyboard', 'type', { text: ch });
					setTimeout(function () { _selfEdit = false; }, 0);
				} catch (e) {
					try {
						var cur = ed.getValue();
						ed.getModel().setValue(cur + ch);
					} catch (e2) {
						_kill();
						return cb();
					}
				}
				_wait(55, cb);
			}

			function _typeString(str, index, cb) {
				if (!_live) return cb();
				if (index >= str.length) return cb();
				var ch = str[index];
				_typeChar(ch, function () {
					if (ch === '"' || ch === '.' || ch === ':') {
						setTimeout(function () {
							try { ed.trigger('', 'editor.action.triggerSuggest'); } catch (e) {}
						}, 50);
					}
					_typeString(str, index + 1, cb);
				});
			}

			try {
				_track(ed.onKeyDown(_kill));
				_track(ed.onMouseDown(_kill));
				if (ed.onDidPaste) _track(ed.onDidPaste(_kill));
				_track(ed.onDidChangeModelContent(function () {
					if (!_selfEdit) _kill();
				}));
			} catch (e) {}

			_wait(400, function () {
				var current;
				try { current = ed.getValue(); } catch (e) { return; }
				if (current.replace(/\s+$/, '') !== ORIGINAL_TEXT.replace(/\s+$/, '')) {
					_kill();
					return;
				}

				try {
					ed.focus();
					var model = ed.getModel();
					var endPos = model.getPositionAt(model.getValueLength());
					ed.setSelection(new monaco.Range(endPos.lineNumber, endPos.column, endPos.lineNumber, endPos.column));
					ed.revealPosition(endPos);
				} catch (e) {}

				requestAnimationFrame(function () {
					_wait(120, function () {
						if (!_live) return;
						var rawOpts = ed.getRawOptions();
						var origAutoQuote = rawOpts.autoClosingQuotes || 'always';
						var origAutoBracket = rawOpts.autoClosingBrackets || 'always';
						ed.updateOptions({
							autoClosingQuotes: 'never',
							autoClosingBrackets: 'never'
						});

						function _restoreOptions() {
							try {
								ed.updateOptions({
									autoClosingQuotes: origAutoQuote,
									autoClosingBrackets: origAutoBracket
								});
							} catch (e) {}
						}

						_eraseTo(ORIGINAL_TEXT, KEEP_PREFIX, function () {
							if (!_live) { _restoreOptions(); return; }
							_typeString(NEW_SUFFIX, 0, function () {
								_restoreOptions();
								_cleanupListeners();
							});
						});
					});
				});
			});
		}
